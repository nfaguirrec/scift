name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      FC: gfortran
      SCIFT_HOME: ${{ github.workspace }}
      LD_LIBRARY_PATH: ${{ github.workspace }}/src

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libfftw3-dev libopenblas-dev liblapack-dev gawk

    - name: Add utils to PATH
      run: |
        echo "${{ github.workspace }}/utils" >> $GITHUB_PATH
        echo "${{ github.workspace }}/examples" >> $GITHUB_PATH

    - name: Compile library and examples
      run: |
        make

    - name: Compile and run tests
      run: |
        cd tests
        make
        ./run_tests.exe
